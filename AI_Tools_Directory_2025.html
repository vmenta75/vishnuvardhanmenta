<style>

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

/* Atmospheric background */

/* Subtle animated gradient shift */
.bg-shift{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(800px circle at var(--mx,50%) var(--my,50%),rgba(37,99,235,0.04),transparent 50%);

.tools-table{width:100%;border-collapse:separate;border-spacing:0}
.tools-table thead th{position:sticky;top:0;padding:12px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--fg-dim);background:var(--bg-elevated);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color .2s;white-space:nowrap}
.tools-table thead th:hover{color:var(--fg-muted)}.tools-table thead th.sorted{color:var(--accent-bright)}.tools-table thead th .sort-icon{margin-left:4px;font-size:10px}
.tools-table tbody tr{transition:background .15s}.tools-table tbody tr:hover{background:var(--bg-hover)}
.tools-table tbody td{padding:14px 14px;font-size:13.5px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
.tool-name{font-weight:600;color:var(--fg);display:flex;align-items:center;gap:8px}.tool-name .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.capability-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11.5px;margin:2px 3px 2px 0;background:var(--bg-hover);color:var(--fg-muted);border:1px solid var(--border)}

.capability-tag.phone{background:rgba(59,130,246,0.08);color:#60a5fa;border-color:rgba(59,130,246,0.15)}

.free-tip{font-size:12.5px;color:var(--fg-muted);line-height:1.6}.free-tip strong{color:var(--green);font-weight:500}
.yt-link{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;color:#ff4444;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.15);text-decoration:none;transition:all .2s;white-space:nowrap}

.yt-link-compact{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;color:#ff4444;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.15);text-decoration:none;transition:all .2s}.yt-link-compact:hover{background:rgba(255,68,68,0.16);border-color:rgba(255,68,68,0.35)}.yt-link-compact i{font-size:13px}
.download-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--bg-card);color:var(--fg);font-family:inherit}
.download-btn:hover{background:var(--bg-hover);border-color:var(--accent);color:var(--accent-bright);transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,0.1)}

.stat-card{padding:20px 24px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;transition:all .2s}.stat-card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.stat-number{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;line-height:1}.stat-label{font-size:13px;color:var(--fg-muted);margin-top:6px}
.table-wrap{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg-elevated);box-shadow:0 4px 30px rgba(0,0,0,0.15)}
.table-scroll{max-height:65vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-light) transparent}.table-scroll::-webkit-scrollbar{width:6px}.table-scroll::-webkit-scrollbar-track{background:transparent}.table-scroll::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

.toast{position:fixed;bottom:30px;right:30px;padding:14px 22px;background:var(--bg-card);border:1px solid var(--green);border-radius:12px;color:var(--green);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transform:translateY(100px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:100;box-shadow:0 10px 40px rgba(0,0,0,0.4);max-width:420px}
.toast.show{transform:translateY(0);opacity:1}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-up{animation:fadeUp .4s ease forwards}
.tabs-scroll{overflow-x:auto;scrollbar-width:none}.tabs-scroll::-webkit-scrollbar{display:none}
.pricing-cell{font-size:12.5px;color:var(--fg-muted);line-height:1.6}
.view-toggle{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:3px}
.view-toggle button{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--fg-dim);background:transparent;border:none;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:5px}
.view-toggle button:hover{color:var(--fg-muted)}.view-toggle button.active{background:var(--bg-hover);color:var(--fg)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
.tool-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:24px;transition:all .2s}.tool-card:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.tool-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.tool-card-name{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.tool-card-section{margin-bottom:12px}.tool-card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--fg-dim);margin-bottom:6px}
.download-overlay{position:fixed;inset:0;background:rgba(3,7,18,0.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.download-overlay.active{opacity:1;pointer-events:all}
.download-modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:18px;padding:32px;max-width:440px;width:90%;text-align:center;transform:scale(.9);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.download-overlay.active .download-modal{transform:scale(1)}
.download-modal h3{font-size:18px;font-weight:700;margin-bottom:8px}.download-modal p{font-size:13px;color:var(--fg-muted);margin-bottom:24px;line-height:1.6}
.download-modal-actions{display:flex;gap:10px;justify-content:center}.download-modal-actions .download-btn{flex:1;justify-content:center}
select{background:var(--bg-card)!important;color:var(--fg)!important}
select option{background:var(--bg-card);color:var(--fg)}
@media(max-width:768px){.tools-table thead th,.tools-table tbody td{padding:10px 8px;font-size:12px}.stat-number{font-size:24px}.hide-mobile{display:none}.card-grid{grid-template-columns:1fr}}
@media print{.header{position:relative}.no-print{display:none!important}.table-scroll{max-height:none;overflow:visible}body{background:#fff;color:#111}.tool-card{border:1px solid #ddd;break-inside:avoid}}

var currentCategory='Research',sortCol=-1,sortAsc=true,currentView='table',pendingDownloadAction=null;

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btnDownloadCurrent').addEventListener('click',function(e){e.preventDefault();e.stopPropagation();promptDownload('current');});
  document.getElementById('btnDownloadAll').addEventListener('click',function(e){e.preventDefault();e.stopPropagation();promptDownload('all');});
  document.getElementById('btnPrint').addEventListener('click',function(){window.print();});
  document.getElementById('btnCopy').addEventListener('click',function(){copyTableToClipboard();});
  document.getElementById('btnTableView').addEventListener('click',function(){setView('table');});
  document.getElementById('btnCardView').addEventListener('click',function(){setView('card');});
  document.getElementById('searchInput').addEventListener('input',function(){filterTools();});
  document.getElementById('costFilter').addEventListener('change',function(){filterTools();});
  document.getElementById('modalCancel').addEventListener('click',closeModal);
  document.getElementById('modalConfirm').addEventListener('click',executeDownload);
  document.getElementById('downloadOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.querySelectorAll('.tools-table thead th[data-col]').forEach(function(th){th.addEventListener('click',function(){sortTable(parseInt(this.getAttribute('data-col')));});});
  buildTabs();renderStats();renderView();
});

function capTagClass(cap){var c=cap.toLowerCase();if(c.indexOf('whatsapp')>-1)return'capability-tag whatsapp';if(c.indexOf('phone')>-1||c.indexOf('voice call')>-1)return'capability-tag phone';if(c.indexOf('sms')>-1||c.indexOf('mms')>-1||c.indexOf('2fa')>-1||c.indexOf('verify')>-1)return'capability-tag sms';if(c.indexOf('ai')>-1||c.indexOf('nlp')>-1||c.indexOf('llm')>-1||c.indexOf('bot')>-1||c.indexOf('agent')>-1)return'capability-tag ai-tag';return'capability-tag';}

function promptDownload(type){var overlay=document.getElementById('downloadOverlay'),title=document.getElementById('modalTitle'),desc=document.getElementById('modalDesc'),icon=document.getElementById('modalIcon');if(type==='current'){var tools=allTools.filter(function(t){return t.category===currentCategory;});title.textContent='Download: '+currentCategory;desc.textContent='CSV with '+tools.length+' tools including capabilities, pricing, free-usage tips, and YouTube links.';}else{var cats=[];allTools.forEach(function(t){if(cats.indexOf(t.category)===-1)cats.push(t.category);});title.textContent='Download: All Categories';desc.textContent='CSV with '+allTools.length+' tools across '+cats.length+' categories including capabilities, pricing, free-usage tips, and YouTube links.';}icon.innerHTML='<i class="fas fa-file-csv"></i>';icon.style.color='var(--accent-bright)';pendingDownloadAction=type;overlay.classList.add('active');}
function closeModal(){document.getElementById('downloadOverlay').classList.remove('active');pendingDownloadAction=null;}
function executeDownload(){if(!pendingDownloadAction)return;var type=pendingDownloadAction;closeModal();if(type==='current'){var tools=allTools.filter(function(t){return t.category===currentCategory;});triggerDownload(buildCSV(tools,false),'AI_Tools_'+currentCategory.replace(/[^a-zA-Z0-9]/g,'_')+'.csv',tools.length);}else{triggerDownload(buildCSV(allTools,true),'AI_Tools_Directory_All_Categories.csv',allTools.length);}}
function triggerDownload(csvString,filename,count){try{var blob=new Blob(['\uFEFF'+csvString],{type:'text/csv;charset=utf-8;'});if(navigator.msSaveBlob){navigator.msSaveBlob(blob,filename);showToast('Downloaded '+count+' tools as '+filename);return;}var url=URL.createObjectURL(blob),link=document.createElement('a');link.setAttribute('href',url);link.setAttribute('download',filename);link.style.display='none';document.body.appendChild(link);setTimeout(function(){link.click();setTimeout(function(){document.body.removeChild(link);URL.revokeObjectURL(url);},250);},100);showToast('Downloaded '+count+' tools as '+filename);}catch(err){try{var link=document.createElement('a');link.setAttribute('href','data:text/csv;charset=utf-8,'+encodeURIComponent('\uFEFF'+csvString));link.setAttribute('download',filename);link.style.display='none';document.body.appendChild(link);setTimeout(function(){link.click();setTimeout(function(){document.body.removeChild(link);},250);},100);showToast('Downloaded (fallback)');}catch(e){showToast('Download failed — use Ctrl+S',true);}}}
function buildCSV(tools,includeCategory){var headers=includeCategory?['Category','Tool Name','Capabilities','Cost Type','Pricing Details','How to Maximize Free Usage','YouTube Tutorial Link']:['Tool Name','Capabilities','Cost Type','Pricing Details','How to Maximize Free Usage','YouTube Tutorial Link'];var lines=[headers.join(',')];for(var i=0;i<tools.length;i++){var t=tools[i];var row=includeCategory?[t.category,t.name,t.capabilities.join('; '),t.cost,t.pricing,stripHTML(t.freeTip),t.youtube]:[t.name,t.capabilities.join('; '),t.cost,t.pricing,stripHTML(t.freeTip),t.youtube];lines.push(row.map(csvEscape).join(','));}return lines.join('\r\n');}
function csvEscape(val){if(val===null||val===undefined)return'""';var s=String(val);if(s.indexOf(',')>-1||s.indexOf('"')>-1||s.indexOf('\n')>-1)return'"'+s.replace(/"/g,'""')+'"';return'"'+s+'"';}
function stripHTML(html){if(!html)return'';var div=document.createElement('div');div.innerHTML=html;return(div.textContent||div.innerText||'').trim();}

function buildTabs(){var categories=[];allTools.forEach(function(t){if(categories.indexOf(t.category)===-1)categories.push(t.category);});var container=document.getElementById('catTabs');container.innerHTML='';categories.forEach(function(cat){var count=allTools.filter(function(t){return t.category===cat;}).length;var tab=document.createElement('button');tab.className='cat-tab'+(cat===currentCategory?' active':'');tab.innerHTML='<i class="fas '+(categoryIcons[cat]||'fa-circle')+'" style="font-size:12px;color:'+categoryColors[cat]+'"></i>'+cat+'<span class="count">'+count+'</span>';tab.addEventListener('click',function(){currentCategory=cat;sortCol=-1;document.getElementById('searchInput').value='';document.getElementById('costFilter').value='all';buildTabs();renderStats();renderView();});container.appendChild(tab);});}

function renderStats(){var filtered=allTools.filter(function(t){return t.category===currentCategory;});var freeTools=filtered.filter(function(t){return t.cost==='Free'||t.cost==='Open Source';}).length;var freemiumTools=filtered.filter(function(t){return t.cost==='Freemium';}).length;var totalCapabilities=filtered.reduce(function(s,t){return s+t.capabilities.length;},0);var stats=[{n:filtered.length,l:'Total Tools',c:categoryColors[currentCategory]},{n:freeTools,l:'Free / Open Source',c:'var(--green)'},{n:freemiumTools,l:'Freemium Plans',c:'var(--accent-bright)'},{n:totalCapabilities,l:'Capabilities Listed',c:'var(--fg-muted)'}];document.getElementById('statsRow').innerHTML=stats.map(function(s){return'<div class="stat-card"><div class="stat-number" style="color:'+s.c+'">'+s.n+'</div><div class="stat-label">'+s.l+'</div></div>';}).join('');}

function getFilteredTools(){var search=document.getElementById('searchInput').value.toLowerCase(),costFilter=document.getElementById('costFilter').value;return allTools.filter(function(t){if(t.category!==currentCategory)return false;if(costFilter!=='all'&&t.cost!==costFilter)return false;if(search){var s=(t.name+' '+t.capabilities.join(' ')+' '+t.cost+' '+t.pricing+' '+t.freeTip+' '+t.youtube).toLowerCase();if(s.indexOf(search)===-1)return false;}return true;});}
function filterTools(){renderView();}

function setView(v){currentView=v;document.getElementById('btnTableView').classList.toggle('active',v==='table');document.getElementById('btnCardView').classList.toggle('active',v==='card');document.getElementById('tableView').style.display=v==='table'?'':'none';document.getElementById('cardView').style.display=v==='card'?'':'none';renderView();}
function renderView(){if(currentView==='table')renderTable();else renderCards();}

function getSortedTools(){var tools=getFilteredTools();if(sortCol>=0){var keys=['name','capabilities','cost','pricing','freeTip','youtube'];tools.sort(function(a,b){var va=keys[sortCol]==='capabilities'?a.capabilities.join(', '):a[keys[sortCol]];var vb=keys[sortCol]==='capabilities'?b.capabilities.join(', '):b[keys[sortCol]];if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();if(va<vb)return sortAsc?-1:1;if(va>vb)return sortAsc?1:-1;return 0;});}return tools;}
function sortTable(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderView();}
function updateSortIndicators(){document.querySelectorAll('.tools-table thead th[data-col]').forEach(function(th){var col=parseInt(th.getAttribute('data-col'));th.classList.toggle('sorted',col===sortCol);var icon=th.querySelector('.sort-icon');if(icon){icon.className='sort-icon';if(col===sortCol)icon.className='sort-icon fas fa-sort-'+(sortAsc?'up':'down');}});}

function renderTable(){var tools=getSortedTools(),tbody=document.getElementById('tableBody'),color=categoryColors[currentCategory];if(!tools.length){tbody.innerHTML='<tr><td colspan="6"><div class="no-results"><i class="fas fa-search"></i><p>No tools match your search</p></div></td></tr>';document.getElementById('resultCount').textContent='0 results';return;}var h='';for(var i=0;i<tools.length;i++){var t=tools[i],cc=t.cost==='Free'?'cost-free':t.cost==='Freemium'?'cost-freemium':t.cost==='Open Source'?'cost-open':'cost-paid';var ci=t.cost==='Free'?'fa-gift':t.cost==='Open Source'?'fa-code-branch':t.cost==='Freemium'?'fa-bolt':'fa-credit-card';var yl=t.name.indexOf('(')>-1?t.name.split('(')[0].trim():t.name;var caps='';for(var j=0;j<t.capabilities.length;j++)caps+='<span class="'+capTagClass(t.capabilities[j])+'">'+t.capabilities[j]+'</span>';h+='<tr><td><div class="tool-name"><span class="dot" style="background:'+color+'"></span>'+t.name+'</div></td><td class="hide-mobile">'+caps+'</td><td><span class="cost-badge '+cc+'"><i class="fas '+ci+'" style="font-size:10px"></i> '+t.cost+'</span></td><td class="pricing-cell hide-mobile">'+t.pricing+'</td><td><div class="free-tip">'+t.freeTip+'</div></td><td style="text-align:center"><a href="'+t.youtube+'" target="_blank" rel="noopener noreferrer" class="yt-link-compact" title="Watch '+yl+' tutorial"><i class="fab fa-youtube"></i></a></td></tr>';}tbody.innerHTML=h;document.getElementById('resultCount').textContent=tools.length+' tool'+(tools.length!==1?'s':'')+' in '+currentCategory;updateSortIndicators();}

function renderCards(){var tools=getSortedTools(),container=document.getElementById('cardView'),color=categoryColors[currentCategory];if(!tools.length){container.innerHTML='<div class="no-results" style="grid-column:1/-1"><i class="fas fa-search"></i><p>No tools match your search</p></div>';document.getElementById('resultCount').textContent='0 results';return;}var h='';for(var i=0;i<tools.length;i++){var t=tools[i],cc=t.cost==='Free'?'cost-free':t.cost==='Freemium'?'cost-freemium':t.cost==='Open Source'?'cost-open':'cost-paid';var ci=t.cost==='Free'?'fa-gift':t.cost==='Open Source'?'fa-code-branch':t.cost==='Freemium'?'fa-bolt':'fa-credit-card';var yl=t.name.indexOf('(')>-1?t.name.split('(')[0].trim():t.name;var caps='';for(var j=0;j<t.capabilities.length;j++)caps+='<span class="'+capTagClass(t.capabilities[j])+'">'+t.capabilities[j]+'</span>';h+='<div class="tool-card"><div class="tool-card-header"><div class="tool-card-name"><span style="width:8px;height:8px;border-radius:50%;display:inline-block;background:'+color+'"></span>'+t.name+'</div><span class="cost-badge '+cc+'"><i class="fas '+ci+'" style="font-size:10px"></i> '+t.cost+'</span></div><div class="tool-card-body"><div class="tool-card-section"><div class="tool-card-label">Capabilities</div><div>'+caps+'</div></div><div class="tool-card-section"><div class="tool-card-label">Pricing</div><div class="pricing-cell">'+t.pricing+'</div></div><div class="tool-card-section"><div class="tool-card-label">How to Maximize Free Usage</div><div class="free-tip">'+t.freeTip+'</div></div></div><div style="padding-top:12px;border-top:1px solid var(--border)"><a href="'+t.youtube+'" target="_blank" rel="noopener noreferrer" class="yt-link"><i class="fab fa-youtube"></i> Watch '+yl+' Tutorial</a></div></div>';}container.innerHTML=h;document.getElementById('resultCount').textContent=tools.length+' tool'+(tools.length!==1?'s':'')+' in '+currentCategory;}

function copyTableToClipboard(){var tools=getFilteredTools(),headers=['Tool Name','Capabilities','Cost','Pricing','Free Usage Tips','YouTube Tutorial'],text=headers.join('\t')+'\n';for(var i=0;i<tools.length;i++){var t=tools[i];text+=[t.name,t.capabilities.join('; '),t.cost,t.pricing,stripHTML(t.freeTip),t.youtube].join('\t')+'\n';}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){showToast('Copied '+tools.length+' tools to clipboard');}).catch(function(){fallbackCopy(text);});}else{fallbackCopy(text);}}
function fallbackCopy(text){try{var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied to clipboard');}catch(e){showToast('Copy failed — use CSV download',true);}}

function showToast(msg,isError){var toast=document.getElementById('toast'),icon=toast.querySelector('i');document.getElementById('toastMsg').textContent=msg;if(isError){toast.classList.add('error');icon.className='fas fa-exclamation-circle';}else{toast.classList.remove('error');icon.className='fas fa-check-circle';}toast.classList.add('show');setTimeout(function(){toast.classList.remove('show');},3500);}
</script>
